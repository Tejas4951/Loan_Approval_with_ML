<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-2xl font-bold text-center mb-6">Loan Approval Application</h1>
        <form id="loanForm" class="space-y-4">
            <div>
                <label for="dependents" class="block text-sm font-medium text-gray-700">Number of Dependents</label>
                <input type="number" id="dependents" name="dependents" min="0" max="10" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="education" class="block text-sm font-medium text-gray-700">Education</label>
                <select id="education" name="education" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="Graduate">Graduate</option>
                    <option value="Not Graduate">Not Graduate</option>
                </select>
            </div>
            <div>
                <label for="self_employed" class="block text-sm font-medium text-gray-700">Self Employed</label>
                <select id="self_employed" name="self_employed" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div>
                <label for="income" class="block text-sm font-medium text-gray-700">Annual Income (₹)</label>
                <input type="number" id="income" name="income" min="0" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="loan_amount" class="block text-sm font-medium text-gray-700">Loan Amount (₹)</label>
                <input type="number" id="loan_amount" name="loan_amount" min="0" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="loan_term" class="block text-sm font-medium text-gray-700">Loan Term (Years)</label>
                <input type="number" id="loan_term" name="loan_term" min="1" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="cibil_score" class="block text-sm font-medium text-gray-700">CIBIL Score</label>
                <input type="number" id="cibil_score" name="cibil_score" min="300" max="900" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="residential_assets" class="block text-sm font-medium text-gray-700">Residential Assets Value (₹)</label>
                <input type="number" id="residential_assets" name="residential_assets" min="0" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="commercial_assets" class="block text-sm font-medium text-gray-700">Commercial Assets Value (₹)</label>
                <input type="number" id="commercial_assets" name="commercial_assets" min="0" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="luxury_assets" class="block text-sm font-medium text-gray-700">Luxury Assets Value (₹)</label>
                <input type="number" id="luxury_assets" name="luxury_assets" min="0" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label for="bank_assets" class="block text-sm font-medium text-gray-700">Bank Assets Value (₹)</label>
                <input type="number" id="bank_assets" name="bank_assets" min="0" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div class="text-center">
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    Submit Application
                </button>
            </div>
        </form>
        <div id="response" class="mt-4 text-center text-lg font-semibold"></div>
    </div>

    <script>
        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                dependents: parseInt(formData.get('dependents')),
                education: formData.get('education'),
                self_employed: formData.get('self_employed'),
                income: parseInt(formData.get('income')),
                loan_amount: parseInt(formData.get('loan_amount')),
                loan_term: parseInt(formData.get('loan_term')),
                cibil_score: parseInt(formData.get('cibil_score')),
                residential_assets: parseInt(formData.get('residential_assets')),
                commercial_assets: parseInt(formData.get('commercial_assets')),
                luxury_assets: parseInt(formData.get('luxury_assets')),
                bank_assets: parseInt(formData.get('bank_assets'))
            };

            // Simple loan approval logic
            let loanStatus = '';
            let statusClass = '';
            if (
                data.cibil_score >= 600 &&
                data.loan_amount <= 3 * data.income &&
                data.loan_term <= 15
            ) {
                loanStatus = 'Approved';
                statusClass = 'text-green-600';
            } else {
                loanStatus = 'Rejected';
                statusClass = 'text-red-600';
            }

            // Display result
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = `Loan Status: ${loanStatus}`;
            responseDiv.className = `mt-4 text-center text-lg font-semibold ${statusClass}`;

            // Log data for debugging
            console.log('Form Data:', data);
            console.log('Loan Status:', loanStatus);
        });
    </script>
</body>
</html>
